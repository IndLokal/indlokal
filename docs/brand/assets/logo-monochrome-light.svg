<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="IndLokal">
  <title>IndLokal — monochrome light (for dark backgrounds)</title>
  <!-- For dark backgrounds. Mark uses a soft cream tile so it stays visible. -->
  <g transform="translate(0,0)">
    <rect width="220" height="220" rx="48" fill="#FAFAF9"/>
    <polyline points="36,128 86,128 110,60 134,128 184,128"
              fill="none" stroke="#312E81" stroke-width="18"
              stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="110" cy="60" r="11" fill="#312E81"/>
  </g>
  <text x="260" y="148" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="112" letter-spacing="-3"
        fill="#FAFAF9">IndLokal</text>
</svg>
