<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="IndLokal — your Indian community, locally">
  <title>IndLokal — Open Graph image</title>
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Decorative pulse echo, top-right -->
  <g opacity="0.16" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="820,80 920,80 956,20 992,150 1028,80 1130,80"/>
  </g>

  <!-- Mark -->
  <g transform="translate(72,72)">
    <rect width="160" height="160" rx="36" fill="#FAFAF9"/>
    <g fill="none" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="26,94 62,94 80,42" stroke="#312E81"/>
      <polyline points="80,42 98,94 134,94" stroke="#F59E0B"/>
    </g>
  </g>

  <!-- Headline -->
  <text x="72" y="350" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="92" letter-spacing="-3" fill="#FAFAF9">Your Indian community,</text>
  <text x="72" y="450" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="92" letter-spacing="-3" fill="#FCD34D">locally.</text>

  <!-- Sub -->
  <text x="72" y="520" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="30" letter-spacing="-0.3" fill="#FAFAF9" opacity="0.85">Communities · Events · Resources, active near you in Germany.</text>

  <!-- URL -->
  <text x="72" y="582" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="600" font-size="26" letter-spacing="0.4" fill="#FAFAF9" opacity="0.7">indlokal.de · indlokal.com</text>
</svg>
