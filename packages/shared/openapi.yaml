paths:
  /api/v1/auth/magic-link/request:
    post:
      summary: Request a magic-link email
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  maxLength: 254
                  format: email
                redirectTo:
                  type: string
                  maxLength: 500
              required:
                - email
      responses:
        "200":
          description: Always 200 to prevent account enumeration
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                required:
                  - ok
        "400":
          description: Error envelope
          content:
            application/json: &a13
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Error envelope
          content:
            application/json: *a13
  /api/v1/auth/magic-link/verify:
    post:
      summary: Verify a magic-link token and receive auth tokens
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  minLength: 1
                  maxLength: 500
              required:
                - token
      responses:
        "200":
          description: Auth tokens + user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  accessExpiresAt:
                    type: string
                    format: date-time
                  refreshExpiresAt:
                    type: string
                    format: date-time
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        minLength: 20
                        maxLength: 40
                      email:
                        type: string
                        format: email
                      displayName:
                        type:
                          - string
                          - "null"
                      avatarUrl:
                        type:
                          - string
                          - "null"
                        format: uri
                      role:
                        type: string
                        enum: *a2
                      cityId:
                        type:
                          - string
                          - "null"
                        minLength: 20
                        maxLength: 40
                      personaSegments:
                        type: array
                        items:
                          type: string
                      preferredLanguages:
                        type: array
                        items:
                          type: string
                      onboardingComplete:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
                      lastActiveAt:
                        type:
                          - string
                          - "null"
                        format: date-time
                    required:
                      - id
                      - email
                      - displayName
                      - avatarUrl
                      - role
                      - cityId
                      - personaSegments
                      - preferredLanguages
                      - onboardingComplete
                      - createdAt
                      - lastActiveAt
                required:
                  - accessToken
                  - refreshToken
                  - accessExpiresAt
                  - refreshExpiresAt
                  - user
        "400":
          description: Error envelope
          content:
            application/json: *a13
        "401":
          description: Error envelope
          content:
            application/json: *a13
  /api/v1/auth/google:
    post:
      summary: Exchange a Google authorization code for auth tokens
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  minLength: 1
                codeVerifier:
                  type: string
                  minLength: 1
                redirectUri:
                  type: string
                  format: uri
              required:
                - code
                - redirectUri
      responses:
        "200":
          description: Auth tokens + user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  accessExpiresAt:
                    type: string
                    format: date-time
                  refreshExpiresAt:
                    type: string
                    format: date-time
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        minLength: 20
                        maxLength: 40
                      email:
