name: Release Production

env:
  # Opt in now to GitHub Actions JavaScript runtime Node 24 to avoid the Node 20 deprecation cliff.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Tagged releases are the only production deployment path.
#
# Expected release flow:
#   1. Merge tested code to `main` to update the staging preview deployment.
#   2. Create and push a release tag like `v1.2.0` on a commit that is already on `main`.
#   3. This workflow verifies the tag points to `main`, runs production DB migrations,
#      and then creates the Vercel production deployment for that tagged commit.
#
# Requires repository secrets:
#   DATABASE_URL        — production database connection string
#   VERCEL_TOKEN        — Vercel token with access to the project
#   VERCEL_ORG_ID       — Vercel team/org ID
#   VERCEL_PROJECT_ID   — Vercel project ID

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    name: Release tagged production build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Deploy production migrations
        run: pnpm --filter web exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Pull Vercel production settings
        run: pnpm dlx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel production deployment
        run: pnpm dlx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy tagged release to production
        run: pnpm dlx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}