name: Deploy Staging

env:
  # Opt in now to GitHub Actions JavaScript runtime Node 24 to avoid the Node 20 deprecation cliff.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Runs Prisma migrations against staging only after the main-branch CI
# workflow succeeds.
#
# Requires repository secrets:
#   STAGING_DATABASE_URL  — staging database connection string
#
# In the intended Vercel setup, `main` should be treated as a preview/staging
# branch, not the production branch. Vercel will still create the staging
# preview deployment for `main`, while this workflow updates the staging DB only
# after the main CI gate passes.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  migrate:
    name: Run staging database migrations
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Deploy migrations
        run: pnpm --filter web exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
