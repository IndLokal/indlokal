      (github.event_name == 'workflow_dispatch' && (inputs.job == 'pipeline' || inputs.job == 'pipeline-hesse' || inputs.job == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '50 2 * * *')
    steps:
      - name: POST /api/cron/pipeline?region=hesse
        run: |
          STATUS=$(curl -s -o /tmp/pipeline.json -w "%{http_code}" \
            --max-time 310 \
            -X POST "${{ secrets.APP_URL }}/api/cron/pipeline?region=hesse" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/pipeline.json
          [ "$STATUS" -eq 200 ] || (echo "pipeline returned HTTP $STATUS" && exit 1)

  links:
    name: Verify join links
    runs-on: ubuntu-latest
