name: Cron Jobs

# Simple MVP cron runner. GitHub Actions is good enough until these jobs become
# user-visible or business-critical. Requires repository secrets:
#   APP_URL      — production base URL, e.g. https://indlokal.de
#   CRON_SECRET  — shared secret matching CRON_SECRET env var on Vercel

on:
  schedule:
    # Keep scores fresh enough for MVP demos.
    - cron: '0 */6 * * *'
    # Daily maintenance jobs.
    - cron: '0 3 * * *'
    # Sharded pipeline runs to stay within time budgets.
    - cron: '5 2 * * *'
    - cron: '20 2 * * *'
    - cron: '35 2 * * *'
    - cron: '50 2 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (links | keywords | relationships | enrichment | scores | pipeline | pipeline-berlin | pipeline-bw | pipeline-bavaria | pipeline-hesse | all)'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  scores:
    name: Refresh scores
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'scores' || inputs.job == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *')
    steps:
      - name: POST /api/cron/scores
        run: |
          STATUS=$(curl -s -o /tmp/scores.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/scores" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/scores.json
          [ "$STATUS" -eq 200 ] || (echo "scores returned HTTP $STATUS" && exit 1)

  pipeline_berlin:
    name: AI pipeline (Berlin)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'pipeline' || inputs.job == 'pipeline-berlin' || inputs.job == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '5 2 * * *')
    steps:
      - name: POST /api/cron/pipeline?region=berlin
        run: |
          STATUS=$(curl -s -o /tmp/pipeline.json -w "%{http_code}" \
            --max-time 310 \
            -X POST "${{ secrets.APP_URL }}/api/cron/pipeline?region=berlin" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/pipeline.json
          [ "$STATUS" -eq 200 ] || (echo "pipeline returned HTTP $STATUS" && exit 1)

  pipeline_bw:
    name: AI pipeline (Baden-Wuerttemberg)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'pipeline' || inputs.job == 'pipeline-bw' || inputs.job == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '20 2 * * *')
    steps:
      - name: POST /api/cron/pipeline?region=baden-wuerttemberg
        run: |
          STATUS=$(curl -s -o /tmp/pipeline.json -w "%{http_code}" \
            --max-time 310 \
            -X POST "${{ secrets.APP_URL }}/api/cron/pipeline?region=baden-wuerttemberg" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/pipeline.json
          [ "$STATUS" -eq 200 ] || (echo "pipeline returned HTTP $STATUS" && exit 1)

  pipeline_bavaria:
    name: AI pipeline (Bavaria)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'pipeline' || inputs.job == 'pipeline-bavaria' || inputs.job == 'all')) ||
      (github.event_name == 'schedule' && github.event.schedule == '35 2 * * *')
    steps:
      - name: POST /api/cron/pipeline?region=bavaria
        run: |
          STATUS=$(curl -s -o /tmp/pipeline.json -w "%{http_code}" \
            --max-time 310 \
            -X POST "${{ secrets.APP_URL }}/api/cron/pipeline?region=bavaria" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/pipeline.json
          [ "$STATUS" -eq 200 ] || (echo "pipeline returned HTTP $STATUS" && exit 1)

  pipeline_hesse:
    name: AI pipeline (Hesse)
    runs-on: ubuntu-latest
