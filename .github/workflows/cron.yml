            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/relationships.json
          [ "$STATUS" -eq 200 ] || (echo "relationships returned HTTP $STATUS" && exit 1)

  enrichment:
    name: Enrich sparse communities
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'enrichment' || inputs.job == 'all')) ||
