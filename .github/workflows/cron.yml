name: Cron Jobs

# Simple MVP cron runner. GitHub Actions is good enough until these jobs become
# user-visible or business-critical. Requires repository secrets:
#   APP_URL      — production base URL, e.g. https://indlokal.de
#   CRON_SECRET  — shared secret matching CRON_SECRET env var on Vercel

on:
  # Disabled: cron jobs paused for now (can re-enable below)
  # schedule:
  #   # Keep scores fresh enough for MVP demos.
  #   - cron: '0 */6 * * *'
  #   # Daily maintenance and pipeline.
  #   - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (links | keywords | relationships | enrichment | scores | pipeline | all)'
        required: false
        default: 'all'

jobs:
  scores:
    name: Refresh scores
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.job == 'scores' || inputs.job == 'all')
    steps:
      - name: POST /api/cron/scores
        run: |
          STATUS=$(curl -s -o /tmp/scores.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/scores" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/scores.json
          [ "$STATUS" -eq 200 ] || (echo "scores returned HTTP $STATUS" && exit 1)

  pipeline:
    name: AI content pipeline
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.job == 'pipeline' || inputs.job == 'all')
    steps:
      - name: POST /api/cron/pipeline
        run: |
          STATUS=$(curl -s -o /tmp/pipeline.json -w "%{http_code}" \
            --max-time 310 \
            -X POST "${{ secrets.APP_URL }}/api/cron/pipeline" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/pipeline.json
          [ "$STATUS" -eq 200 ] || (echo "pipeline returned HTTP $STATUS" && exit 1)

  links:
    name: Verify join links
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.job == 'links' || inputs.job == 'all')
    steps:
      - name: POST /api/cron/links
        run: |
          STATUS=$(curl -s -o /tmp/links.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/links" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/links.json
          [ "$STATUS" -eq 200 ] || (echo "links returned HTTP $STATUS" && exit 1)

  keywords:
    name: Refresh keyword suggestions
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.job == 'keywords' || inputs.job == 'all')
    steps:
      - name: POST /api/cron/keywords
        run: |
          STATUS=$(curl -s -o /tmp/keywords.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/keywords" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/keywords.json
          [ "$STATUS" -eq 200 ] || (echo "keywords returned HTTP $STATUS" && exit 1)

  relationships:
    name: Infer community relationships
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.job == 'relationships' || inputs.job == 'all')
    steps:
      - name: POST /api/cron/relationships
        run: |
          STATUS=$(curl -s -o /tmp/relationships.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/relationships" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/relationships.json
          [ "$STATUS" -eq 200 ] || (echo "relationships returned HTTP $STATUS" && exit 1)

  enrichment:
    name: Enrich sparse communities
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.job == 'enrichment' || inputs.job == 'all')
    steps:
      - name: POST /api/cron/enrichment
        run: |
          STATUS=$(curl -s -o /tmp/enrichment.json -w "%{http_code}" \
            --max-time 190 \
            -X POST "${{ secrets.APP_URL }}/api/cron/enrichment" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/enrichment.json
          [ "$STATUS" -eq 200 ] || (echo "enrichment returned HTTP $STATUS" && exit 1)
